<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Leaderboard — VSurvivors</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0b11;color:#e7e7ea;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:40px 16px;gap:24px;}

    h1{font-size:22px;font-weight:800;letter-spacing:1px;color:#e7ecf9;text-shadow:0 2px 0 #000a;}
    .sub{color:#4a6080;font-size:13px;}

    .card{background:#0f1420;border:1px solid #1e2a42;border-radius:16px;
      width:min(640px,100%);padding:0;overflow:hidden;}

    table{width:100%;border-collapse:collapse;font-size:14px;}
    thead tr{background:#090d18;}
    thead th{padding:10px 12px;color:#3a5070;font-size:11px;font-weight:700;
      letter-spacing:.8px;text-transform:uppercase;text-align:left;}
    thead th.num{text-align:right;}

    tbody tr{border-top:1px solid #121a2c;transition:background .1s;}
    tbody tr:hover{background:#111828;}
    tbody td{padding:10px 12px;color:#cdd3e0;}
    tbody td.num{text-align:right;}

    .rank{color:#3a5070;font-size:13px;}
    .name{color:#e7ecf9;font-weight:600;max-width:140px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .score{color:#aae8ff;font-weight:700;}
    .kills{color:#44dd88;}
    .time-col{color:#888;}
    .lv{color:#ffd040;}

    .medal{font-size:16px;}

    .btn{display:inline-block;padding:9px 20px;background:#111a2e;border:1px solid #2a3650;
      border-radius:10px;color:#e7ecf9;font-weight:700;font-size:13px;
      cursor:pointer;text-decoration:none;transition:background .1s;}
    .btn:hover{background:#1a2640;}

    .empty{padding:40px;text-align:center;color:#3a5070;font-size:15px;}
    .loading{padding:40px;text-align:center;color:#3a5070;}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid #1e2a42;
      border-top-color:#3a5070;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
  </style>
</head>
<body>

  <h1>🏆 Leaderboard</h1>
  <p class="sub">Top players — VSurvivors · Digital Dreamscape</p>

  <div class="card" id="card">
    <p class="loading"><span class="spinner"></span> Loading…</p>
  </div>

  <a class="btn" href="index.html">← Back to game</a>

<script>
  // ─── Config ── paste the same values as in game.js ─────────────────────────
  const SUPABASE_URL = 'https://wieewilxnegogbijfdwo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_keBGHcIbB2P-WO_zIyJVGA_EKUXX8GT';
  // ───────────────────────────────────────────────────────────────────────────

  function fmtTime(s){ s=s|0; const m=(s/60)|0,r=s%60; return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0'); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function load(){
    const card = document.getElementById('card');
    if(!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL'){
      card.innerHTML = '<p class="empty">⚙️ Supabase not configured yet.<br><span style="font-size:12px;color:#2a3650">Paste your URL and KEY into this file and game.js</span></p>';
      return;
    }
    try{
      const res = await fetch(
        SUPABASE_URL+'/rest/v1/scores?order=score.desc&limit=50&select=name,score,kills,time_seconds,level,created_at',
        { headers:{ apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } }
      );
      const rows = await res.json();
      if(!Array.isArray(rows)||!rows.length){
        card.innerHTML='<p class="empty">No scores yet — be the first! 🎮</p>'; return;
      }
      const medals=['🥇','🥈','🥉'];
      let h='<table><thead><tr>'
          +'<th>#</th><th>Name</th>'
          +'<th class="num">Score</th><th class="num">Kills</th>'
          +'<th class="num">Time</th><th class="num">Lv</th>'
          +'</tr></thead><tbody>';
      rows.forEach((r,i)=>{
        const rank = i<3 ? '<span class="medal">'+medals[i]+'</span>' : '<span class="rank">'+(i+1)+'</span>';
        h+='<tr>'
          +'<td>'+rank+'</td>'
          +'<td class="name">'+esc(r.name)+'</td>'
          +'<td class="num score">'+r.score+'</td>'
          +'<td class="num kills">'+r.kills+'</td>'
          +'<td class="num time-col">'+fmtTime(r.time_seconds||0)+'</td>'
          +'<td class="num lv">'+r.level+'</td>'
          +'</tr>';
      });
      h+='</tbody></table>';
      card.innerHTML=h;
    }catch(e){
      card.innerHTML='<p class="empty">❌ Failed to load: '+esc(e.message)+'</p>';
    }
  }

  load();
  // auto-refresh every 30s
  setInterval(load, 30000);
</script>
</body>
</html>
